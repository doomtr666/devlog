{{ define "main" }}
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <ul class="post-list">
        {{ range first 5 (where .Site.RegularPages "Section" "posts") }}
        <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format ":date_medium" }}</time>
        </li>
        {{ end }}
    </ul>
{{ end }}
