{{ define "main" }}
    <h1>{{ .Title }}</h1>
    <ul>
        {{ range (where .Site.Pages "Section" "posts") }}
            <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time>
                <p>{{ .Summary }}</p>
            </li>
        {{ end }}
    </ul>
    {{ template "_internal/pagination.html" . }}
{{ end }}
