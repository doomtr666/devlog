<!DOCTYPE html>
<html lang="{{ .Lang }}">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    {{ $style := resources.Get "css/style.css" | resources.Minify | resources.Fingerprint }}
    <link rel="stylesheet" href="{{ $style.Permalink }}">
    {{ range .AllTranslations }}
        <link rel="alternate" hreflang="{{ .Language.LanguageCode }}" href="{{ .Permalink }}">
    {{ end }}
    <script data-goatcounter="https://doomtr666.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    {{ block "head" . }}
    {{ end }}
    </head>

<body>
    <header>
        {{ partial "header.html" . }}
    </header>
    <main>
        <div class="container">
            {{ block "main" . }}
            {{ end }}
        </div>
    </main>
    <footer>
        {{ partial "footer.html" . }}
    </footer>
    <script src="/js/fslightbox.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('main img');
            images.forEach(img => {
                if (img.closest('a')) return;
                const link = document.createElement('a');
                link.href = img.src;
                link.setAttribute('data-fslightbox', 'gallery');
                img.parentNode.insertBefore(link, img);
                link.appendChild(img);
            });
            refreshFsLightbox();
        });
    </script>
</body>

</html>
